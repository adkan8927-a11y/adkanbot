name: Daily Stock News Crawler

on:
  schedule:
    # 1. 장전 시황: 한국 시간 화~금 오전 04:50 실행 (월~목 19:50 UTC)
    - cron: '50 19 * * 1-4'
    # 2. 장후 시황: 한국 시간 월~금 오후 22:00 실행 (월~금 13:00 UTC)
    - cron: '0 13 * * 1-5'
    # 3. 주말 시황: 한국 시간 일요일 오후 20:00 실행 (일요일 11:00 UTC)
    - cron: '0 11 * * 0'
  workflow_dispatch:
    inputs:
      report_type:
        description: '실행할 리포트 유형 (장전/장후/주말)을 선택하세요'
        required: true
        default: '장전'
        type: choice
        options:
          - '장전'
          - '장후'
          - '주말'

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 리포트 md 파일을 저장소에 커밋하기 위한 권한 허용

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # pip 캐시 캐싱을 돕고 필수 패키지 설치
        pip install requests feedparser sentence-transformers torch markdown

    - name: Identify Schedule & Run Crawler
      env:
        # GitHub Secrets 환경변수를 파이썬 스크립트에 주입
        NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
        NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # KST = UTC + 9
        HOUR=$(date -u +%H)
        DAY=$(date -u +%u) # 1=월, 7=일
        
        echo "현재 UTC 시간: $(date -u)"
        echo "현재 시간(시): $HOUR, 요일: $DAY"
        
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          TYPE="${{ github.event.inputs.report_type }}"
          echo "🌐 수동 트리거 실행: [$TYPE] 스크립트 실행"
          if [ "$TYPE" = "장전" ]; then
            python3 "데일리뉴스(장전).py"
          elif [ "$TYPE" = "장후" ]; then
            python3 "데일리뉴스(장후).py"
          elif [ "$TYPE" = "주말" ]; then
            python3 "데일리뉴스(주말).py"
          fi
        elif [ "$HOUR" = "19" ]; then
          echo "🌅 [장전 뉴스] 수집기 가동..."
          python3 "데일리뉴스(장전).py"
        elif [ "$HOUR" = "11" ] && [ "$DAY" = "7" ]; then
          echo "📅 [주말 종합 뉴스] 수집기 가동..."
          python3 "데일리뉴스(주말).py"
        elif [ "$HOUR" = "13" ]; then
          echo "🌆 [장후 뉴스] 수집기 가동..."
          python3 "데일리뉴스(장후).py"
        fi

    - name: Commit and Push Report File
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 1. 인덱스 페이지 자동 생성
        python3 generate_index.py
        
        # 2. 변경사항 스테이징 (리포트 폴더, 인덱스 페이지 및 md 파일들)
        git add reports/ index.html *.md
        
        # 새로운 리포트가 커밋될 때만 push 진행
        if ! git diff --cached --exit-code; then
          git commit -m "docs: 데일리 시황 리포트 및 인덱스 허브 자동 업데이트 ($(date +'%Y-%m-%d %H:%M'))"
          git push origin main
        else
          echo "변경 사항 없음"
        fi
